{% extends "base.html" %}
{% block title %}Iniciar Sesión — CosmoStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="fw-bold text-center mb-4">
          <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
        </h3>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small">{{ field.errors }}</div>
            {% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-dark w-100 mt-2">Ingresar</button>
        </form>
        <hr>
        <p class="text-center text-muted mb-0">
          ¿No tienes cuenta? <a href="{% url 'accounts:register' %}">Regístrate</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
