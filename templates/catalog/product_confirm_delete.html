{% extends "base.html" %}
{% block title %}Eliminar Producto — CosmoStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger shadow-sm">
      <div class="card-body text-center p-5">
        <i class="bi bi-exclamation-triangle-fill text-danger fs-1"></i>
        <h3 class="mt-3">¿Eliminar producto?</h3>
        <p class="text-muted">¿Estás seguro de eliminar <strong>"{{ product.name }}"</strong>? Esta acción no se puede deshacer.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Sí, eliminar</button>
          <a href="{% url 'catalog:product_list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
