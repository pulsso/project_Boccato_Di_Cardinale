{% extends "base.html" %}
{% block title %}Pago Cancelado — CosmoStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 text-center">
    <div class="card shadow-sm p-5">
      <i class="bi bi-x-circle-fill text-danger" style="font-size:4rem;"></i>
      <h2 class="fw-bold mt-3">Pago Cancelado</h2>
      <p class="text-muted">El pago de la orden #{{ order.id }} fue cancelado.</p>
      <div class="d-flex gap-2 justify-content-center mt-3">
        <a href="{% url 'orders:order_detail' order.id %}" class="btn btn-dark">
          Volver a la orden
        </a>
        <a href="{% url 'catalog:product_list' %}" class="btn btn-outline-dark">
          Ir a la tienda
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
