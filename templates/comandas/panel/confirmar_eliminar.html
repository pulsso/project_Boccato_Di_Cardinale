{% extends "base.html" %}
{% block title %}Eliminar {{ tipo }} | Boccato{% endblock %}

{% block content %}
<div style="max-width:640px;margin:0 auto;">
  <div style="background:var(--bc-surface);border:1px solid rgba(212,175,55,0.12);border-radius:6px;padding:24px;">
    <h1 style="margin:0 0 12px;font-family:var(--bc-serif);font-size:28px;color:var(--bc-cream);">Eliminar {{ tipo }}</h1>
    <p style="color:var(--bc-muted);font-family:var(--bc-sans);font-size:14px;">
      Vas a eliminar <strong>{{ objeto }}</strong>. Esta accion afecta el layout operativo.
    </p>
    <form method="post" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;">
      {% csrf_token %}
      <button type="submit" style="padding:10px 16px;border-radius:4px;border:1px solid rgba(239,68,68,0.35);background:transparent;color:#fca5a5;font-family:var(--bc-sans);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;">Eliminar</button>
      <a href="{% url 'comandas:panel_mesas' %}" style="padding:10px 16px;border-radius:4px;border:1px solid rgba(212,175,55,0.28);color:var(--bc-gold);text-decoration:none;font-family:var(--bc-sans);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
