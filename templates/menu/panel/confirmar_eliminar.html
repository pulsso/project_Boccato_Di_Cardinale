{% extends "base.html" %}
{% block title %}Eliminar {{ tipo }} | Boccato{% endblock %}

{% block content %}
<div class="card p-4 mx-auto" style="max-width:640px;">
  <h2 class="fw-bold mb-3">Eliminar {{ tipo }}</h2>
  <p>Se eliminara <strong>{{ objeto }}</strong>. Esta accion no se puede deshacer.</p>
  <form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Eliminar</button>
    {% if tipo == 'Categoria' %}
    <a class="btn btn-outline-secondary" href="{% url 'menu:panel_categorias' %}">Cancelar</a>
    {% else %}
    <a class="btn btn-outline-secondary" href="{% url 'menu:panel_items' %}">Cancelar</a>
    {% endif %}
  </form>
</div>
{% endblock %}
