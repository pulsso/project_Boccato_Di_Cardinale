{% extends "base.html" %}
{% block title %}Contacto — CosmoStore{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="fw-bold mb-4"><i class="bi bi-envelope"></i> Contáctanos</h2>
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <div class="text-danger small mt-1">{{ field.errors }}</div>
            {% endif %}
          </div>
          {% endfor %}
          <button type="submit" class="btn btn-dark w-100">Enviar mensaje</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
